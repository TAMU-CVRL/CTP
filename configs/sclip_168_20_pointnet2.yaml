Name: "sclip_168_20_pointnet2"

Model:
  clip_model: "ViT-B/32"
  lidar_model: "PointNet2"
  alpha: 0.5  # weight for image and text features

Dataset:
  train_data_path: "data/nuscenes_triplet_train.pt"
  eval_data_path: "data/nuscenes_triplet_val.pt"

Train:
  device: "cuda"

  batch_size: 168
  epochs: 20
  learning_rate: 0.0005
  weight_decay: 0.2
  warmup_ratio: 0.01
  accumulation_steps: 2

  optimizer: "AdamW"

  scheduler:
    type: "cosine"
    num_cycles: 0.5

  # For resuming training
  checkpoint_path: Null
  tensorboard_logdir: Null

Eval:
  checkpoint_path: Null
